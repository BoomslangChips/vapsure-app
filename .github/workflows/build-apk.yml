name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'twa-manifest.json'
      - '.github/workflows/build-apk.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli@latest

      - name: Provide signing keystore
        env:
          KS_B64: ${{ secrets.ANDROID_KEYSTORE_B64 }}
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -e
          if [ -n "$KS_B64" ]; then
            printf '%s' "$KS_B64" | base64 -d > android.keystore
            echo "keystore: restored from ANDROID_KEYSTORE_B64 secret"
          else
            keytool -genkeypair -v -keystore android.keystore -alias vapsure \
              -keyalg RSA -keysize 2048 -validity 10000 \
              -storepass "$KS_PASS" -keypass "$KS_PASS" \
              -dname "CN=Vap-Sure, O=Vap-Sure Underwriting Managers, L=Johannesburg, C=ZA"
            echo "keystore: generated fresh (uploaded as an artifact below so it can be saved to a secret)"
            echo "NEW_KEYSTORE=1" >> "$GITHUB_ENV"
          fi

      - name: Upload generated keystore (first run only)
        if: env.NEW_KEYSTORE == '1'
        uses: actions/upload-artifact@v4
        with:
          name: keystore
          path: android.keystore
          retention-days: 1

      - name: Point Bubblewrap at the JDK / Android SDK
        run: |
          mkdir -p ~/.bubblewrap
          printf '{"jdkPath":"%s","androidSdkPath":"%s"}\n' "$JAVA_HOME" "$ANDROID_HOME" > ~/.bubblewrap/config.json
          cat ~/.bubblewrap/config.json

      - name: Generate project + build signed APK
        env:
          BUBBLEWRAP_KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          BUBBLEWRAP_KEY_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          set -e
          bubblewrap update --skipVersionUpgrade
          bubblewrap build --skipPwaValidation
          ls -la *.apk

      - name: Show signing SHA-256 (put this in the site's assetlinks.json)
        env:
          KS_PASS: ${{ secrets.KEYSTORE_PASSWORD }}
        run: |
          echo "::group::SHA-256 fingerprint"
          keytool -list -v -keystore android.keystore -alias vapsure -storepass "$KS_PASS" | grep "SHA256:" || true
          echo "::endgroup::"

      - name: Rename APK
        run: |
          SRC=$(ls app-release-signed.apk 2>/dev/null || ls *.apk | head -n1)
          echo "Using $SRC"
          cp "$SRC" vapsure.apk

      - name: Publish to 'latest' release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Vap-Sure Android app (latest)
          body: |
            Signed Android APK that wraps the Vap-Sure quoting portal (portal.vapsure.co.za).
            Download vapsure.apk below and open it on your phone to install.
          files: vapsure.apk
